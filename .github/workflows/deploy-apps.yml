name: Deploy Apps

on:
  push:
    branches: [ "main" ]
    paths:
      - 'api/**'
      - 'frontend/**'
      - 'db/**'

jobs:
  build:
    name: Build and Deploy Apps
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build API image
        run: docker build --tag yancyrafael/coffeeshop-api:latest ./api

      - name: Build Web image
        run: docker build --tag yancyrafael/coffeeshop-web:latest ./frontend

      - name: Push API image
        run: docker push yancyrafael/coffeeshop-api:latest

      - name: Push Web image
        run: docker push yancyrafael/coffeeshop-web:latest