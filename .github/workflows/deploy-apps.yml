name: Deploy Sitio2

on:
  push:
    branches: [ "main" ]
    paths:
      - 'sitio2/**'

jobs:
  build:
    name: Build and Deploy apps 
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Login to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKERHUB_USERNAME }}
          password: ${{ secrets.DOCKERHUB_TOKEN }}

      - name: Build image
        run: docker build --tag yancyrafael/coffeshop-api:latest ./api

        name: Build image
        run: docker build --tag yancyrafael/coffeshop-web:latest ./frontend

      - name: Push API image
        run: docker push yancyrafael/coffeshop-api:latest

        name: Push Web image
        run: docker push yancyrafael/coffeshop-web:latest